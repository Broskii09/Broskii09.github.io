<body onload="getDataFromEmployees('container'), getDataFromEvents('events')">
<div class="container-fluid">
  <div class="row">
    <div id="container" class="col-8 text-center"> <img src="https://broskii09.github.io/img/44News-Family.png" alt="44News Family" style="width: 75%; height: auto;position:relative;top:15px;"> </div>
    <div class="col-4"> 
      <!-- Time and Date and Temp Info -->
      <div id="TimeDate" class="row align-self-center justify-content-center g-0">
        <div class="row align-content-center text-center" id="BulletinHeader">
          <div class="col-6">
            <div class="tick" data-did-init="handleTickInit" style="font-size:4rem;">
              <div data-layout="horizontal">
				  <span data-key="dayOfWeekAbbreviated" data-view="flip" data-transform="pad(00)"> </span>
				  <span data-view="text" data-key="dateSep" class="tick-text-inline"></span>
				  <span data-key="monthAbbreviated" data-view="flip" data-transform="pad(00)"> </span>
				  <span data-view="text" data-key="dateSep" class="tick-text-inline"></span>
				  <span data-key="date" data-view="flip" data-transform="pad(00)"> </span>
				  <span data-view="text" data-key="dateSep" class="tick-text-inline"></span>
				  <!--<span data-key="year" data-view="flip" data-transform="pad(0000)"> </span>-->
				</div>
            </div>
          </div>
          <div class="col-6">
            <div class="tick" data-did-init="handleTickInit" style="font-size:4rem;">
              <div data-layout="horizontal">
				  <span data-key="hours" data-transform="pad(00)" data-view="flip"></span>
				  <span data-view="text" data-key="timeSep" class="tick-text-inline"></span>
				  <span data-key="minutes" data-transform="pad(00)" data-view="flip"></span>
				  <span data-view="text" data-key="timeSep" class="tick-text-inline"></span>
				  <span data-key="seconds" data-transform="pad(00)" data-view="flip"></span>
				  <span data-key="ampm" data-transform="pad(00)" data-view="flip"></span>
				</div>
            </div>
          </div>
          <!-- Col-6 End--> 
          
        </div>
        <div id="WeatherWidget" class="col-12 text-center align-self-center fw-2">
          <div style="text-transform: uppercase; font-weight: 900;" id="ww_7dce70c1da929" v='1.3' loc='id' a='{"t":"ticker","lang":"en","sl_lpl":1,"ids":["wl3427"],"font":"Arial","sl_ics":"one_a","sl_sot":"fahrenheit","cl_bkg":"#FFFFFF00","cl_font":"rgba(255,222,23,1)","cl_cloud":"#d4d4d4","cl_persp":"#2196F3","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722"}'>Weather Data Source: <a href="https://sharpweather.com/weather_evansville/30_days/" id="ww_7dce70c1da929_u" target="_blank">30 days Evansville weather</a></div>
          <script async src="https://app1.weatherwidget.org/js/?id=ww_7dce70c1da929"></script> </div>
      </div>
      <div class="row">
        <div class="table-responsive col-12" id="events"></div>
		  <div class="row">
</div>
        <div class="col-12">
          <video class="ratio-16x9 img-fluid" style="display: none;" src="" controls autoplay loop muted></video>
        </div>
      </div>
    </div>
    <!--	<div class="col-8" style="position: absolute; bottom: 10px; left: 0px;"><img class="img-fluid" src="img/Banner-44News_Generic.png" alt="44News Banner"  ></div>--> 
  </div>
</div>

<!-- jQuery -->

<!-- Bootstrap JavaScript --> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

<!-- Confetti FX--> 
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0">
	</script>
